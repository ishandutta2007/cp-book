# Merged into the generated Jekyll _config.yml by competitive-verifier's
# docs builder.
# github-pages enables jekyll-titles-from-headings by default, which promotes
# a page's first h1-h3 to its title (rendering it as the page heading instead
# of the file path). The plugin has no h1-only setting, so disable it.
titles_from_headings:
  enabled: false
